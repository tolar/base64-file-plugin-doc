title: Base64 File Plugin - View, Edit & Encode Base64 Files
description: Professional base64 file plugin for JetBrains IDEs. View, edit, encode and decode base64 files directly in your IDE. Support for base64 encoded files in IntelliJ IDEA, PyCharm, WebStorm and more.
url: "https://base64file.com" # Your website URL
baseurl: ""  # Set this to an empty string for custom domains
author:
  name: Vaclav Tolar

logo: /assets/images/logo.svg


#theme: minimal-mistakes-jekyll
remote_theme: mmistakes/minimal-mistakes@4.26.2

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache
  - jekyll-seo-tag

include: [ "_pages", "_docs" ]

future: true

collections:
  docs:
    output: true
    sort_by: weight
    permalink: /docs/:title/
  use_cases:
    output: true
    sort_by: weight
    permalink: /use_cases/:title/


defaults:
  - scope:
      path: ""
      type: docs
    values:
      toc: true
      toc_label: "On this page"
      toc_sticky: true
      sidebar:
        nav: "doc-nav"
  - scope:
      path: ""
      type: use_cases
    values:
      toc: false
      sidebar:
        nav: "use-cases-nav"
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      show_date: true





